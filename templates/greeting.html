<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
      /* Minimal greeting page layout */
      .greet-full{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff5ec,#fffaf6);overflow:hidden}
      .greet-card{max-width:1100px;width:92%;height:auto;display:flex;align-items:center;justify-content:center}
      .greet-card img{width:100%;height:auto;border-radius:12px;box-shadow:0 20px 60px rgba(2,6,23,0.12)}
      .greet-controls{position:fixed;top:18px;right:18px;z-index:9999}
      .greet-controls a{background:rgba(0,0,0,0.6);color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none}
      .greet-hint{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);color:#333;background:rgba(255,255,255,0.9);padding:10px 14px;border-radius:999px;font-weight:600;box-shadow:0 6px 18px rgba(2,6,23,0.06)}
    </style>
  </head>
  <body>
    <!-- Redirect to gallery (root now forwards to /gallery). If reached directly, forward user. -->
    <script>window.location = '{{ url_for("browse", req_path="") }}'</script>
  </body>
</html>
